<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Lvst Store</title>
  <link rel="stylesheet" href="./css/style.css">
  <link rel="stylesheet" href="./css/auth.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <!-- Navbar -->
  <header id="navbar">
    <div class="container">
      <div class="nav-inner">
        <a href="./index.html" class="nav-logo">Lvst<span>Store</span></a>
        <ul class="nav-links">
          <li><a href="./index.html">Home</a></li>
          <li><a href="./shop.html">Shop</a></li>
          <li><a href="./sale.html">Sale 🔥</a></li>
        </ul>
        <div class="nav-actions">
          <a href="./wishlist.html" class="nav-icon"><i class="fa-regular fa-heart"></i></a>
          <a href="./cart.html" class="nav-icon">
            <i class="fa-solid fa-bag-shopping"></i>
            <span class="nav-badge" id="cartCount">0</span>
          </a>
        </div>
        <div class="nav-hamburger" id="hamburger">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div>
  </header>

  <!-- Mobile Menu -->
  <div class="mobile-menu" id="mobileMenu">
    <ul>
      <li><a href="./index.html">Home</a></li>
      <li><a href="./shop.html">Shop</a></li>
      <li><a href="./sale.html">Sale 🔥</a></li>
      <li><a href="./register.html">Register</a></li>
    </ul>
  </div>

  <!-- Auth Section -->
  <section class="auth-section">
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-header">
          <a href="./index.html" class="nav-logo">Lvst<span>Store</span></a>
          <h1>Welcome Back</h1>
          <p>Login to your account to continue shopping</p>
        </div>

        <form id="loginForm">
          <div class="form-group">
            <label>Email Address</label>
            <div class="input-wrap">
              <i class="fa-regular fa-envelope"></i>
              <input type="email" id="email" placeholder="Enter your email" required>
            </div>
          </div>

          <div class="form-group">
            <label>Password</label>
            <div class="input-wrap">
              <i class="fa-solid fa-lock"></i>
              <input type="password" id="password" placeholder="Enter your password" required>
              <button type="button" class="toggle-password" id="togglePassword">
                <i class="fa-regular fa-eye"></i>
              </button>
            </div>
          </div>

          <p class="form-error" id="loginError"></p>

          <button type="submit" class="btn btn-primary auth-btn" id="loginBtn">
            Login <i class="fa-solid fa-arrow-right"></i>
          </button>
        </form>

        <div class="auth-footer">
          <p>Don't have an account? <a href="./register.html">Register here</a></p>
        </div>
      </div>
    </div>
  </section>

  <div class="toast" id="toast"></div>

  <script src="./js/main.js"></script>
  <script src="./js/auth.js"></script>
</body>
</html>
